<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birdwatching Community</title>

  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="full-page theme-light" id="page">

    <div class="card" id="card-light">
      <img src="./assets/birdwatcher.jpg" alt="Birdwatching Icon" class="card-icon" />
      <h1 class="title">Birdwatching Community</h1>
      <p class="subtitle">
        Discover the amazing world of birds. Observe, share photos, and join our global database.
      </p>
      <a href="#" class="btn btn-birdwatching" id="birdwatching-link">Start Observing</a>
    </div>

    <div class="card hidden" id="card-dark">
      <img src="./assets/apocalypse.png" alt="Buried Marks Icon" class="card-icon" />
      <h1 class="title glitch">SYSTEM OVERRIDE</h1>
      <p class="subtitle buried-text">
        The surface is a lie. Descend into the Buried Marks. We've been waiting for you.
      </p>
      <a href="#" class="btn btn-marks" id="marks-link">ENTER BURIED MARKS</a>
    </div>

    <div class="footer">
      <p>
        © 2026 Birdwatching Project
        <span class="secret-trigger" id="secret-trigger">.</span>
      </p>
    </div>

  </div>

  <script src="main.js"></script>
</body>
</html>
